<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God's Eye — SSA Platform v2</title>
    <meta name="description"
        content="Real-time Space Situational Awareness platform with live CelesTrak orbital data and NOAA space weather integration.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="//unpkg.com/globe.gl"></script>
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="logo">
                <span class="logo-icon">◉</span>
                <h1>GOD'S EYE</h1>
                <span class="version-badge">v2 — LIVE DATA</span>
            </div>
            <div class="header-status">
                <span id="data-source-badge" class="badge badge-live">● LIVE</span>
                <span id="connection-status" class="badge badge-ok">API CONNECTED</span>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main">
            <!-- Left Panel -->
            <aside id="left-panel">
                <!-- Space Weather Panel -->
                <section class="panel" id="weather-panel">
                    <h2 class="panel-title">⚡ SPACE WEATHER</h2>
                    <div class="weather-grid">
                        <div class="weather-card" id="kp-card">
                            <label>Kp INDEX</label>
                            <span class="weather-value" id="kp-value">—</span>
                        </div>
                        <div class="weather-card" id="f107-card">
                            <label>F10.7 FLUX</label>
                            <span class="weather-value" id="f107-value">—</span>
                        </div>
                        <div class="weather-card full-width" id="storm-card">
                            <label>GEOMAGNETIC</label>
                            <span class="weather-value" id="storm-value">—</span>
                        </div>
                    </div>
                </section>

                <!-- Satellite Group Selector -->
                <section class="panel">
                    <h2 class="panel-title">🛰 CATALOG</h2>
                    <div class="control-group">
                        <label for="group-select">Satellite Group</label>
                        <select id="group-select">
                            <option value="stations">Space Stations</option>
                            <option value="active">Active Satellites</option>
                            <option value="starlink">Starlink</option>
                            <option value="visual">Brightest / Visible</option>
                            <option value="weather">Weather Sats</option>
                            <option value="geo">Geostationary</option>
                            <option value="cosmos-2251-debris">Cosmos 2251 Debris</option>
                            <option value="fengyun-1c-debris">Fengyun 1C Debris</option>
                            <option value="last-30-days">Last 30 Days</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="sat-select">Select Satellite</label>
                        <select id="sat-select">
                            <option value="">— Load catalog first —</option>
                        </select>
                    </div>
                    <button id="btn-load-catalog" class="btn btn-secondary">Load Catalog</button>
                </section>

                <!-- Prediction Controls -->
                <section class="panel">
                    <h2 class="panel-title">📡 PREDICT</h2>
                    <div class="control-group">
                        <label for="prediction-days">Window: <span id="days-value">1 Day</span></label>
                        <input type="range" id="prediction-days" min="1" max="14" value="1">
                    </div>
                    <div class="control-group">
                        <label for="steps-per-day">Fidelity: <span id="steps-value">24 Steps</span></label>
                        <input type="range" id="steps-per-day" min="12" max="360" value="24" step="12">
                    </div>
                    <div class="btn-group">
                        <button id="btn-baseline" class="btn btn-primary">▶ Run SGP4</button>
                        <button id="btn-clear" class="btn btn-ghost">✕ Clear</button>
                    </div>
                </section>
            </aside>

            <!-- Globe -->
            <div id="globeViz"></div>

            <!-- Right Panel: Telemetry -->
            <aside id="right-panel">
                <section class="panel terminal-panel">
                    <h2 class="panel-title">📟 TELEMETRY</h2>
                    <div id="terminal" class="terminal"></div>
                </section>
            </aside>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
